name: release

# Publishes to PyPI when a GitHub Release is published.
# Requires a repository secret PYPI_API_TOKEN (a PyPI API token, value starts
# with "pypi-"). Mirrors the Rust port's release workflow.
on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Test
        run: uv run pytest -q

      - name: Verify tag matches pyproject version
        if: github.event_name == 'release'
        run: |
          pkg_version="$(uv version --short 2>/dev/null || python3 -c 'import tomllib,sys; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          tag="${GITHUB_REF_NAME#v}"
          echo "pyproject=$pkg_version  tag=$tag"
          if [ "$pkg_version" != "$tag" ]; then
            echo "::error::Release tag ($tag) does not match pyproject version ($pkg_version)"
            exit 1
          fi

      - name: Build
        run: uv build

      - name: Publish to PyPI
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: uv publish
